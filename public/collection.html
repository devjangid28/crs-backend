<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Device Collection - CRS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1f2937; min-height: 100vh; }
.container { max-width: 560px; margin: 0 auto; padding: 20px; }

/* Progress Steps */
.progress { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
.progress .step { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; transition: all 0.3s; }
.progress .step.active { background: #6366f1; color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.4); }
.progress .step.done { background: #059669; color: white; }
.progress .step.pending { background: #e5e7eb; color: #9ca3af; }
.progress .line { width: 32px; height: 3px; border-radius: 2px; transition: all 0.3s; }
.progress .line.done { background: #059669; }
.progress .line.pending { background: #e5e7eb; }

/* Cards & Layout */
.header-card { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 28px; border-radius: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
.header-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.header-card p { font-size: 13px; opacity: 0.85; }
.card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1f2937; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }

/* Info Grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-item { background: #f9fafb; padding: 10px 12px; border-radius: 8px; }
.info-item .label { font-size: 11px; color: #6b7280; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
.info-item .value { font-size: 13px; font-weight: 500; color: #1f2937; }

/* Invoice Items */
.invoice-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
.invoice-row:last-child { border-bottom: none; }

/* Confirmations */
.chk-group { margin-bottom: 12px; }
.chk-group label { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; cursor: pointer; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; transition: all 0.2s; user-select: none; }
.chk-group label.checked { border-color: #6366f1; background: #eef2ff; }
.chk-group input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; accent-color: #6366f1; flex-shrink: 0; }
.chk-group .chk-text { flex: 1; line-height: 1.4; }

/* Signature Pad */
.sig-wrapper { border: 2px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 10px; background: #fafafa; }
.sig-wrapper canvas { display: block; width: 100%; height: 200px; touch-action: none; }
.sig-actions { display: flex; gap: 8px; }
.sig-actions button { font-size: 13px; padding: 6px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #e5e7eb; background: white; color: #374151; transition: all 0.15s; }
.sig-actions button:hover { background: #f3f4f6; }

/* Buttons */
.btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.2px; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
.btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { width: 100%; padding: 14px; background: white; color: #6366f1; border: 2px solid #6366f1; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; text-align: center; }
.btn-secondary:hover { background: #eef2ff; }

/* Google Review */
.btn-google { width: 100%; padding: 14px; background: #ea4335; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-google:hover { background: #d33426; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(234,67,53,0.4); }
.btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

/* Utility */
.hidden { display: none !important; }
.loading { text-align: center; padding: 60px 20px; color: #6b7280; }
.loading .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-page { text-align: center; padding: 60px 20px; }
.error-page h2 { color: #dc2626; font-size: 20px; margin-bottom: 8px; }
.error-page p { color: #6b7280; font-size: 14px; }
.success-page { text-align: center; padding: 40px 20px; }
.success-page .check-icon { width: 72px; height: 72px; background: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.success-page .check-icon svg { width: 36px; height: 36px; fill: white; }
.success-page h2 { color: #059669; font-size: 20px; margin-bottom: 8px; }
.success-page p { color: #6b7280; font-size: 14px; line-height: 1.6; }

/* Pulses for Google button */
@keyframes gentlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
.pulse { animation: gentlePulse 2s ease-in-out infinite; }

@media (max-width: 480px) { .container { padding: 12px; } .info-grid { grid-template-columns: 1fr; } .header-card { padding: 20px; } .card { padding: 18px; } }
</style>
</head>
<body>
<div class="container">
  <div id="app">
    <div class="loading"><div class="spinner"></div>Loading collection details...</div>
  </div>
</div>
<script>
const pathParts = window.location.pathname.split('/');
const ticketId = pathParts[2];
const token = pathParts[3];
let step = 1;
let signatureCanvas, signatureCtx, isDrawing = false;
let ticketData = null;

const GOOGLE_REVIEW_URL = 'https://g.page/r/CadbqLfOAXFREBM/review';

async function loadCollection() {
  try {
    const res = await fetch(`/api/collection/${ticketId}/${token}`);
    const json = await res.json();
    if (!json.success) {
      document.getElementById('app').innerHTML = `<div class="error-page"><h2>Invalid Link</h2><p>${json.message || 'This collection link is invalid or has expired.'}</p></div>`;
      return;
    }
    ticketData = json.data;
    showStep1();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-page"><h2>Error</h2><p>Unable to load collection details.</p></div>`;
  }
}

function showProgress(current, total) {
  let html = '<div class="progress">';
  for (let i = 1; i <= total; i++) {
    if (i > 1) html += `<div class="line ${i <= current ? 'done' : 'pending'}"></div>`;
    html += `<div class="step ${i === current ? 'active' : (i < current ? 'done' : 'pending')}">${i < current ? '✓' : i}</div>`;
  }
  html += '</div>';
  return html;
}

function showStep1() {
  const d = ticketData;
  const t = d.ticket;
  step = 1;
  const app = document.getElementById('app');
  app.innerHTML = `
    ${showProgress(1, 4)}
    <div class="header-card">
      <h1>Device Collection</h1>
      <p>Ticket: ${t.ticketId} &middot; Step 1 of 4</p>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="icon">📋</span> Customer &amp; Device Details
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="label">Customer</div><div class="value">${t.customerName}</div></div>
        <div class="info-item"><div class="label">Phone</div><div class="value">${t.customerPhone}</div></div>
        <div class="info-item"><div class="label">Device</div><div class="value">${t.brand} ${t.model}</div></div>
        <div class="info-item"><div class="label">Type</div><div class="value">${t.deviceType || '—'}</div></div>
        <div class="info-item"><div class="label">Serial No.</div><div class="value">${t.serialNumber || '—'}</div></div>
        <div class="info-item"><div class="label">Issue</div><div class="value">${t.problemDescription || '—'}</div></div>
      </div>
    </div>
    ${d.invoices && d.invoices.length > 0 ? `
    <div class="card">
      <div class="card-title">
        <span class="icon">💰</span> Invoice Summary
      </div>
      ${d.invoices.map(inv => `
      <div class="invoice-row">
        <span>${inv.invoiceId}</span>
        <span>₹${(inv.totalAmount || 0).toLocaleString('en-IN')}</span>
        <span style="color:${inv.status === 'paid' ? '#059669' : '#dc2626'};font-weight:500">${inv.status}</span>
      </div>`).join('')}
    </div>` : ''}
    <button class="btn-primary" onclick="showStep2()">Continue</button>
  `;
}

function showStep2() {
  step = 2;
  const app = document.getElementById('app');
  app.innerHTML = `
    ${showProgress(2, 4)}
    <div class="header-card">
      <h1>Device Collection</h1>
      <p>Step 2 of 4 &middot; Confirmations</p>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="icon">✓</span> Please confirm the following
      </div>
      <div class="chk-group">
        <label id="chk1" onclick="toggleCheck(this, 'cond')">
          <input type="checkbox" id="cond" onchange="toggleCheck(this.parentElement, 'cond')">
          <span class="chk-text">I confirm that I have received the device in good condition</span>
        </label>
      </div>
      <div class="chk-group">
        <label id="chk2" onclick="toggleCheck(this, 'approve')">
          <input type="checkbox" id="approve" onchange="toggleCheck(this.parentElement, 'approve')">
          <span class="chk-text">I approve the closure of this service job</span>
        </label>
      </div>
    </div>
    <button class="btn-primary" id="step2btn" onclick="showStep3()" disabled>Continue</button>
  `;
}

function toggleCheck(labelEl, id) {
  const cb = document.getElementById(id);
  cb.checked = !cb.checked;
  labelEl.classList.toggle('checked', cb.checked);
  const cond = document.getElementById('cond').checked;
  const approve = document.getElementById('approve').checked;
  document.getElementById('step2btn').disabled = !(cond && approve);
}

function showStep3() {
  step = 3;
  const app = document.getElementById('app');
  app.innerHTML = `
    ${showProgress(3, 4)}
    <div class="header-card">
      <h1>Device Collection</h1>
      <p>Step 3 of 4 &middot; Digital Signature</p>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="icon">✍️</span> Sign to confirm collection
      </div>
      <p style="font-size:13px;color:#6b7280;margin-bottom:12px">Please sign below using your finger or mouse.</p>
      <div class="sig-wrapper">
        <canvas id="sigCanvas" width="600" height="200"></canvas>
      </div>
      <div class="sig-actions">
        <button onclick="clearSignature()">Clear</button>
        <button onclick="undoSignature()">Undo</button>
      </div>
    </div>
    <button class="btn-primary" onclick="showStep4()">Continue</button>
  `;
  initSignature();
}

let lastDrawPoints = [];

function initSignature() {
  signatureCanvas = document.getElementById('sigCanvas');
  const rect = signatureCanvas.parentElement.getBoundingClientRect();
  signatureCanvas.width = Math.min(600, rect.width - 4);
  signatureCanvas.height = 200;
  signatureCtx = signatureCanvas.getContext('2d');
  signatureCtx.strokeStyle = '#1f2937';
  signatureCtx.lineWidth = 2.5;
  signatureCtx.lineCap = 'round';
  signatureCtx.lineJoin = 'round';

  signatureCanvas.addEventListener('mousedown', startDraw);
  signatureCanvas.addEventListener('mousemove', draw);
  signatureCanvas.addEventListener('mouseup', stopDraw);
  signatureCanvas.addEventListener('mouseleave', stopDraw);
  signatureCanvas.addEventListener('touchstart', startDrawTouch, { passive: false });
  signatureCanvas.addEventListener('touchmove', drawTouch, { passive: false });
  signatureCanvas.addEventListener('touchend', stopDraw, { passive: false });
}

function getPos(e) {
  const rect = signatureCanvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) { isDrawing = true; lastDrawPoints = []; const p = getPos(e); signatureCtx.beginPath(); signatureCtx.moveTo(p.x, p.y); lastDrawPoints.push(p); }
function draw(e) { if (!isDrawing) return; const p = getPos(e); signatureCtx.lineTo(p.x, p.y); signatureCtx.stroke(); lastDrawPoints.push(p); }
function stopDraw() { isDrawing = false; }
function startDrawTouch(e) { e.preventDefault(); const t = e.touches[0]; isDrawing = true; lastDrawPoints = []; const rect = signatureCanvas.getBoundingClientRect(); signatureCtx.beginPath(); signatureCtx.moveTo(t.clientX - rect.left, t.clientY - rect.top); lastDrawPoints.push({x: t.clientX - rect.left, y: t.clientY - rect.top}); }
function drawTouch(e) { e.preventDefault(); if (!isDrawing) return; const t = e.touches[0]; const rect = signatureCanvas.getBoundingClientRect(); signatureCtx.lineTo(t.clientX - rect.left, t.clientY - rect.top); signatureCtx.stroke(); }
function clearSignature() { if (signatureCtx) { signatureCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height); } }
function undoSignature() { if (signatureCtx) { signatureCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height); } }

function showStep4() {
  step = 4;
  const sigData = signatureCanvas ? signatureCanvas.toDataURL('image/png') : '';
  const d = ticketData;
  const t = d.ticket;
  const app = document.getElementById('app');
  app.innerHTML = `
    ${showProgress(4, 4)}
    <div class="header-card">
      <h1>Device Collection</h1>
      <p>Step 4 of 4 &middot; Review &amp; Confirm</p>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="icon">📝</span> Review Summary
      </div>
      <div style="background:#f9fafb;border-radius:10px;padding:14px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span style="color:#6b7280">Device</span><span style="font-weight:500">${t.brand} ${t.model}</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span style="color:#6b7280">Ticket</span><span style="font-weight:500">${t.ticketId}</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span style="color:#6b7280">Customer</span><span style="font-weight:500">${t.customerName}</span></div>
      </div>
      ${sigData ? `<div style="margin-bottom:12px"><p style="font-size:11px;color:#6b7280;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px">Signature</p><img src="${sigData}" style="max-height:60px;border:1px solid #e5e7eb;border-radius:6px;background:white;padding:4px"></div>` : ''}
    </div>
    <button class="btn-primary" id="submitBtn" onclick="submitCollection()">Confirm Collection</button>
  `;
}

async function submitCollection() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  const sigData = signatureCanvas ? signatureCanvas.toDataURL('image/png') : '';

  try {
    const res = await fetch(`/api/collection/${ticketId}/${token}/confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        receivedCondition: true,
        approveClosure: true,
        signatureData: sigData,
      })
    });
    const json = await res.json();
    if (json.success) {
      showReviewGate();
    } else {
      alert(json.message || 'Failed to complete collection');
      btn.disabled = false;
      btn.textContent = 'Confirm Collection';
    }
  } catch (e) {
    alert('An error occurred. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Confirm Collection';
  }
}

let reviewGateListener = null;

function showReviewGate() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="success-page">
      <div class="check-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
      </div>
      <h2>Collection Confirmed!</h2>
      <p>Your device has been marked as collected.<br>Thank you for choosing CRS.</p>
      <div id="reviewGate">
        <div style="margin-top:24px;margin-bottom:16px;padding:20px;background:#fef2f1;border:2px solid #ea4335;border-radius:16px">
          <p style="font-size:15px;color:#ea4335;font-weight:600;margin-bottom:8px">One Last Step!</p>
          <p style="font-size:13px;color:#6b7280;line-height:1.6">Please leave a review on Google to help us serve you better. Click the button below, then return here to finish.</p>
        </div>
        <a href="${GOOGLE_REVIEW_URL}" target="_blank" id="googleReviewBtn" class="btn-google pulse" onclick="onReviewClicked()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue to Google Review
        </a>
        <p style="font-size:12px;color:#9ca3af;margin-top:10px">Opens in a new tab. Return here when you're done.</p>
        <button class="btn-secondary" id="completeBtn" style="margin-top:16px;display:none" onclick="showFinalDone()">Complete</button>
        <p id="returnHint" style="font-size:13px;color:#059669;margin-top:12px;display:none;font-weight:500">Welcome back! Click "Complete" to finish.</p>
      </div>
    </div>
  `;
}

function onReviewClicked() {
  document.getElementById('googleReviewBtn').classList.remove('pulse');
  document.getElementById('googleReviewBtn').style.opacity = '0.6';
  const hint = document.getElementById('returnHint');
  hint.textContent = 'Left your review? Switch back to this tab to continue.';
  hint.style.display = 'block';
  hint.style.color = '#6b7280';
  hint.style.fontWeight = '400';

  if (reviewGateListener) {
    document.removeEventListener('visibilitychange', reviewGateListener);
  }
  reviewGateListener = () => {
    if (document.visibilityState === 'visible') {
      document.getElementById('completeBtn').style.display = 'block';
      document.getElementById('returnHint').textContent = 'Welcome back! Click "Complete" to finish.';
      document.getElementById('returnHint').style.color = '#059669';
      document.getElementById('returnHint').style.fontWeight = '500';
      document.getElementById('googleReviewBtn').style.display = 'none';
      if (reviewGateListener) {
        document.removeEventListener('visibilitychange', reviewGateListener);
        reviewGateListener = null;
      }
    }
  };
  document.addEventListener('visibilitychange', reviewGateListener);
}

function showFinalDone() {
  document.getElementById('app').innerHTML = `
    <div class="success-page">
      <div class="check-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
      </div>
      <h2>Thank You!</h2>
      <p>Your review helps us improve!<br>We appreciate your time and feedback.</p>
    </div>
  `;
}

loadCollection();
</script>
</body>
</html>
